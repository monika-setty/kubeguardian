apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeguardian
  labels:
    app: kubeguardian
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubeguardian
  template:
    metadata:
      labels:
        app: kubeguardian
    spec:
      containers:
      - name: kubeguardian
        image: kubeguardian:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5